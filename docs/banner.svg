<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <!-- Sync icon -->
  <g transform="translate(80, 100)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#accent)" stroke-width="3" stroke-dasharray="160" stroke-dashoffset="40"/>
    <path d="M 16 -8 L 22 -16 L 22 0 Z" fill="#38bdf8"/>
    <path d="M -16 8 L -22 16 L -22 0 Z" fill="#818cf8"/>
  </g>
  <!-- Title -->
  <text x="140" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#f8fafc">opencode-github-sync</text>
  <!-- Subtitle -->
  <text x="140" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">Sync your OpenCode world across every machine</text>
  <!-- Badges area -->
  <g transform="translate(140, 145)">
    <rect x="0" y="0" width="80" height="22" rx="4" fill="#38bdf8" opacity="0.15"/>
    <text x="40" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle">Cross-platform</text>
    <rect x="90" y="0" width="60" height="22" rx="4" fill="#818cf8" opacity="0.15"/>
    <text x="120" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#818cf8" text-anchor="middle">Git LFS</text>
    <rect x="160" y="0" width="60" height="22" rx="4" fill="#34d399" opacity="0.15"/>
    <text x="190" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#34d399" text-anchor="middle">Node.js</text>
    <rect x="230" y="0" width="50" height="22" rx="4" fill="#fbbf24" opacity="0.15"/>
    <text x="255" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">MIT</text>
  </g>
</svg>
